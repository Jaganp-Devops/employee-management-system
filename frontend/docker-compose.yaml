version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ems-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: ems-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
