<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Employee - Employee Management System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="employee-edit">
  <header class="navbar">
    <div class="brand">
      <img src="images/logo.png" alt="Logo" onerror="this.style.display='none'">
      <span>EMS</span>
    </div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="employees.html">Employees</a>
      <a href="#" id="logout-btn">Logout</a>
    </nav>
  </header>

  <main class="container">
    <h2 style="margin-bottom:22px; color:#4338ca;">Edit Employee</h2>

    <form id="employee-form" class="card" enctype="multipart/form-data">
      <div class="form-row">
        <div class="form-group">
          <label for="first_name">First Name</label>
          <input type="text" id="first_name" name="first_name" required>
        </div>
        <div class="form-group">
          <label for="last_name">Last Name</label>
          <input type="text" id="last_name" name="last_name" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="text" id="phone" name="phone">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="department">Department</label>
          <select id="department" name="department" required>
            <option value="">Select department</option>
            <option value="Engineering">Engineering</option>
            <option value="Human Resources">Human Resources</option>
            <option value="Sales">Sales</option>
            <option value="Finance">Finance</option>
            <option value="Marketing">Marketing</option>
          </select>
        </div>
        <div class="form-group">
          <label for="position">Position</label>
          <input type="text" id="position" name="position" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="salary">Salary</label>
          <input type="number" id="salary" name="salary" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="hire_date">Hire Date</label>
          <input type="date" id="hire_date" name="hire_date" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="on_leave">On Leave</option>
            <option value="terminated">Terminated</option>
          </select>
        </div>
        <div class="form-group">
          <label for="photo">Photo</label>
          <input type="file" id="photo" name="photo" accept="image/*">
        </div>
      </div>

      <button type="submit" class="btn">Update Employee</button>
      <p id="form-error" class="error-text"></p>
    </form>
  </main>

  <script src="js/api.js"></script>
  <script src="js/employee.js"></script>
</body>
</html>
